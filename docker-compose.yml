version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: prenippon-mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: prenippon_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  cache:
    image: redis:7.0-alpine
    container_name: prenippon-redis-cache
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prenippon-springboot-backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
      - cache
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/prenippon_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root1234
      - SPRING_DATA_REDIS_HOST=cache
    links:
      - db
      - cache

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: prenippon-nextjs-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api/v1
      - NEXT_PUBLIC_USE_MOCK=true
    depends_on:
      - backend

volumes:
  mysql_data:
